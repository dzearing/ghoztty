on:
  push:
    tags:
      - "v*"

name: Release

jobs:
  build:
    runs-on: macos-15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select latest Xcode
        run: |
          LATEST=$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)
          sudo xcode-select -s "$LATEST"
          xcodebuild -version

      - uses: mlugg/setup-zig@v2

      - name: Set release variables
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          ARCH=$(uname -m)
          DMG_NAME="Ghoztty-${VERSION}-${ARCH}.dmg"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "ARCH=$ARCH" >> $GITHUB_ENV
          echo "DMG_NAME=$DMG_NAME" >> $GITHUB_ENV

      - name: Build macOS app
        run: |
          zig build -Doptimize=ReleaseFast -Demit-macos-app -Dxcframework-target=native -Dversion-string="$VERSION"

      - name: Codesign app bundle
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          MACOS_CERTIFICATE_NAME: ${{ secrets.MACOS_CERTIFICATE_NAME }}
          MACOS_CI_KEYCHAIN_PWD: ${{ secrets.MACOS_CI_KEYCHAIN_PWD }}
        run: |
          echo $MACOS_CERTIFICATE | base64 --decode > certificate.p12

          security create-keychain -p "$MACOS_CI_KEYCHAIN_PWD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$MACOS_CI_KEYCHAIN_PWD" build.keychain
          security import certificate.p12 -k build.keychain -P "$MACOS_CERTIFICATE_PWD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$MACOS_CI_KEYCHAIN_PWD" build.keychain

          /usr/bin/codesign --verbose -f -s "$MACOS_CERTIFICATE_NAME" -o runtime "macos/build/ReleaseLocal/Ghoztty.app/Contents/Frameworks/Sparkle.framework/Versions/B/XPCServices/Downloader.xpc"
          /usr/bin/codesign --verbose -f -s "$MACOS_CERTIFICATE_NAME" -o runtime "macos/build/ReleaseLocal/Ghoztty.app/Contents/Frameworks/Sparkle.framework/Versions/B/XPCServices/Installer.xpc"
          /usr/bin/codesign --verbose -f -s "$MACOS_CERTIFICATE_NAME" -o runtime "macos/build/ReleaseLocal/Ghoztty.app/Contents/Frameworks/Sparkle.framework/Versions/B/Autoupdate"
          /usr/bin/codesign --verbose -f -s "$MACOS_CERTIFICATE_NAME" -o runtime "macos/build/ReleaseLocal/Ghoztty.app/Contents/Frameworks/Sparkle.framework/Versions/B/Updater.app"
          /usr/bin/codesign --verbose -f -s "$MACOS_CERTIFICATE_NAME" -o runtime "macos/build/ReleaseLocal/Ghoztty.app/Contents/Frameworks/Sparkle.framework"
          /usr/bin/codesign --verbose -f -s "$MACOS_CERTIFICATE_NAME" -o runtime "macos/build/ReleaseLocal/Ghoztty.app/Contents/PlugIns/DockTilePlugin.plugin"

          /usr/bin/codesign --verbose -f -s "$MACOS_CERTIFICATE_NAME" -o runtime --entitlements "macos/Ghostty.entitlements" macos/build/ReleaseLocal/Ghoztty.app

      - name: Create DMG
        env:
          MACOS_CERTIFICATE_NAME: ${{ secrets.MACOS_CERTIFICATE_NAME }}
        run: |
          npm install --global create-dmg
          create-dmg \
            --identity="$MACOS_CERTIFICATE_NAME" \
            ./macos/build/ReleaseLocal/Ghoztty.app \
            ./
          mv ./*.dmg "./$DMG_NAME"

      - name: Notarize DMG
        env:
          APPLE_NOTARIZATION_ISSUER: ${{ secrets.APPLE_NOTARIZATION_ISSUER }}
          APPLE_NOTARIZATION_KEY_ID: ${{ secrets.APPLE_NOTARIZATION_KEY_ID }}
          APPLE_NOTARIZATION_KEY: ${{ secrets.APPLE_NOTARIZATION_KEY }}
        run: |
          echo "$APPLE_NOTARIZATION_KEY" > notarization_key.p8
          xcrun notarytool store-credentials "notarytool-profile" --key notarization_key.p8 --key-id "$APPLE_NOTARIZATION_KEY_ID" --issuer "$APPLE_NOTARIZATION_ISSUER"
          rm notarization_key.p8

          xcrun notarytool submit "$DMG_NAME" --keychain-profile "notarytool-profile" --wait

          xcrun stapler staple "$DMG_NAME"
          xcrun stapler staple "macos/build/ReleaseLocal/Ghoztty.app"

      - name: Download Sparkle tools
        run: |
          curl -L -o /tmp/Sparkle.tar.xz "https://github.com/sparkle-project/Sparkle/releases/download/2.9.0/Sparkle-2.9.0.tar.xz"
          mkdir -p /tmp/sparkle
          tar xf /tmp/Sparkle.tar.xz -C /tmp/sparkle

      - name: Sign DMG with Sparkle EdDSA key
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          SIGN_OUTPUT=$(echo "$SPARKLE_PRIVATE_KEY" | /tmp/sparkle/bin/sign_update "$DMG_NAME" --ed-key-file -)
          echo "SPARKLE_SIGN_OUTPUT=$SIGN_OUTPUT" >> $GITHUB_ENV
          DMG_LENGTH=$(stat -f%z "$DMG_NAME")
          echo "DMG_LENGTH=$DMG_LENGTH" >> $GITHUB_ENV

      - uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.DMG_NAME }}
          body: |
            Custom Ghoztty build (macOS ${{ env.ARCH }}, signed and notarized).

      - name: Update appcast and deploy to GitHub Pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DOWNLOAD_URL="https://github.com/dzearing/ghoztty/releases/download/v${VERSION}/${DMG_NAME}"
          PUB_DATE=$(date -u '+%a, %d %b %Y %H:%M:%S %z')

          ED_SIGNATURE=$(echo "$SPARKLE_SIGN_OUTPUT" | grep -o 'sparkle:edSignature="[^"]*"' | cut -d'"' -f2)

          REPO_URL="https://x-access-token:${GITHUB_TOKEN}@github.com/dzearing/ghoztty.git"
          git clone --branch gh-pages --single-branch "$REPO_URL" /tmp/gh-pages
          cd /tmp/gh-pages

          python3 - "$VERSION" "$DOWNLOAD_URL" "$ED_SIGNATURE" "$DMG_LENGTH" "$PUB_DATE" <<'PYEOF'
          import sys, xml.etree.ElementTree as ET

          version, url, sig, length, pub_date = sys.argv[1:6]

          ns = {"sparkle": "http://www.andymatuschak.net/xml-namespaces/sparkle"}
          ET.register_namespace("sparkle", ns["sparkle"])
          ET.register_namespace("dc", "http://purl.org/dc/elements/1.1/")

          tree = ET.parse("appcast.xml")
          channel = tree.find("channel")

          item = ET.SubElement(channel, "item")
          ET.SubElement(item, "title").text = f"Version {version}"
          ET.SubElement(item, "{%s}version" % ns["sparkle"]).text = version
          ET.SubElement(item, "{%s}shortVersionString" % ns["sparkle"]).text = version
          ET.SubElement(item, "pubDate").text = pub_date

          enclosure = ET.SubElement(item, "enclosure")
          enclosure.set("url", url)
          enclosure.set("type", "application/octet-stream")
          enclosure.set("{%s}edSignature" % ns["sparkle"], sig)
          enclosure.set("length", length)

          ET.indent(tree, space="    ")
          tree.write("appcast.xml", xml_declaration=True, encoding="utf-8")
          PYEOF

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add appcast.xml
          git commit -m "Update appcast for v${VERSION}"
          git push origin gh-pages
